<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sable - Sports Betting Intelligence Terminal</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <div class="brand-mark">SB</div>
          <div>
            <h1>Sable</h1>
            <p>World Cup betting intelligence terminal</p>
          </div>
        </div>
        <div class="control-row" aria-label="Terminal controls">
          <label class="select-label">
            <span>Fixture</span>
            <select id="fixtureSelect"></select>
          </label>
        </div>
      </header>

      <section class="status-bar" id="statusBar" aria-live="polite"></section>

      <main class="terminal-grid">
        <section class="pane tape-pane" data-pane="tape">
          <div class="pane-header">
            <div>
              <span class="eyebrow">SCORES SSE</span>
              <h2>Match Tape</h2>
            </div>
            <span class="hotkey">WATCH</span>
          </div>
          <div id="matchTape" class="tape-list"></div>
        </section>

        <section class="pane detail-pane" data-pane="match">
          <div class="pane-header">
            <div>
              <span class="eyebrow">MATCH</span>
              <h2 id="matchTitle">Loading</h2>
            </div>
            <span class="hotkey">MATCH</span>
          </div>
          <div id="matchDetail" class="match-detail"></div>
          <div class="chart-wrap">
            <div class="pane-subhead">
              <span>Implied Probability</span>
              <span id="chartMarketLabel">Select market</span>
            </div>
            <div id="oddsChart" class="chart"></div>
          </div>
        </section>

        <section class="pane odds-pane" data-pane="odds">
          <div class="pane-header">
            <div>
              <span class="eyebrow">CONSENSUS</span>
              <h2>Odds Monitor</h2>
            </div>
            <span class="hotkey">ODDS</span>
          </div>
          <div id="oddsMonitor" class="odds-table"></div>
        </section>

        <section class="pane scanner-pane" data-pane="scanner">
          <div class="pane-header">
            <div>
              <span class="eyebrow">ALERTS</span>
              <h2>Market Scanner</h2>
            </div>
            <span class="hotkey">STEAM</span>
          </div>
          <div id="marketScanner" class="scanner-list"></div>
        </section>

        <section class="pane settlement-pane" data-pane="settlement">
          <div class="pane-header">
            <div>
              <span class="eyebrow">DEVNET</span>
              <h2>Settlement Console</h2>
            </div>
            <span class="hotkey">SETTLE</span>
          </div>
          <div id="settlementConsole" class="settlement-console"></div>
        </section>
      </main>

      <footer class="command-console">
        <div id="commandHistory" class="command-history"></div>
        <form id="commandForm" class="command-form">
          <span class="prompt">SABLE&gt;</span>
          <input
            id="commandInput"
            autocomplete="off"
            spellcheck="false"
            aria-label="Command input"
            placeholder="MATCH 18143850 | ODDS | STEAM --live | PROOF <MARKET_ID> | SETTLE <MARKET_ID>"
          >
        </form>
      </footer>
    </div>

    <aside id="receiptDrawer" class="receipt-drawer" aria-label="Resolution receipt drawer"></aside>

    <script type="module" src="/app.js"></script>
  </body>
</html>
